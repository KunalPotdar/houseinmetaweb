
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Maison — Walkthrough</title>
	<link rel="stylesheet" href="aptstyles.css">
	<script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
            }
        }
    </script>
  <style>
    /* Loading overlay */
    #progress-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      z-index: 10;
    }
    #progress-label {
      color: #ffd700;
      font-size: 18px;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
    }
    #progress-percent {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      margin-bottom: 14px;
      font-family: 'Segoe UI', sans-serif;
      letter-spacing: 0.06em;
    }
    #progress-bar-wrap {
      width: 260px;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #ffd700;
      border-radius: 4px;
      transition: width 0.15s ease;
    }

    /* Mobile D-pad */
    #mobile-dpad {
      display: none;
      position: fixed;
      bottom: 36px;
      left: 28px;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .dpad-row { display: flex; gap: 5px; }
    .dpad-btn {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.28);
      border-radius: 12px;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dpad-btn:active { background: rgba(255,215,0,0.3); border-color: #ffd700; }

    /* Mobile look hint */
    #mobile-hint {
      display: none;
      position: fixed;
      bottom: 36px;
      right: 24px;
      color: rgba(255,255,255,0.65);
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      z-index: 100;
      text-align: right;
      pointer-events: none;
      line-height: 1.6;
    }
    #mobile-hint strong { color: #ffd700; }
  </style>
</head>
<body>
  <button id="startWalkthroughBtn" class="walkthrough-btn" style="display:none;">Enter Walkthrough</button>
  <div id="walkthrough-controls" class="controls-panel" style="display: none;">
  <h3>Walkthrough Mode</h3>
	  <ul>
	    <li><strong>W</strong> – Move Forward</li>
	    <li><strong>S</strong> – Move Backward</li>
	    <li><strong>A</strong> – Move Left</li>
	    <li><strong>D</strong> – Move Right</li>
	    <li><strong>Mouse</strong> – Look Around</li>
	    <li><strong>Esc</strong> – Exit Walkthrough</li>
  	</ul>
   </div>

  <!-- Mobile D-pad (bottom-left) -->
  <div id="mobile-dpad">
    <button class="dpad-btn" id="btn-forward">&#9650;</button>
    <div class="dpad-row">
      <button class="dpad-btn" id="btn-left">&#9664;</button>
      <button class="dpad-btn" id="btn-backward">&#9660;</button>
      <button class="dpad-btn" id="btn-right">&#9654;</button>
    </div>
  </div>

  <!-- Mobile look hint (bottom-right) -->
  <div id="mobile-hint">
    <strong>Drag right</strong> to look<br>
    <strong>Arrows</strong> to move
  </div>
   <div id="progress-container">
      <div id="progress-label">Loading your Digital Home</div>
      <div id="progress-percent">0%</div>
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
    </div>

  <script type="module" src="apartment-script.js"></script>
</body>
</html>
