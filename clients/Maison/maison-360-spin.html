<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Maison M2 — 360° View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1b2a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── VIEWER ── */
    #spin-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #spin-container.dragging { cursor: grabbing; }

    #spin-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      will-change: contents;
    }

    /* ── LOADING OVERLAY ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: #0d1b2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 20;
    }
    .loading-title {
      color: #ffd700;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .loading-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.8rem;
    }
    #load-bar-wrap {
      width: 240px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    #load-bar {
      height: 100%;
      width: 0%;
      background: #4e8ce1;
      border-radius: 3px;
      transition: width 0.1s ease;
    }
    #load-pct {
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
    }

    /* ── HINT OVERLAY (shown briefly after load) ── */
    #hint-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 15;
    }
    #hint-overlay.visible { display: flex; }
    .hint-pill {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 0.65rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      animation: fadeOut 0.5s ease 2.5s forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; }
    }
    .hint-icon { font-size: 1.2rem; }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.5rem;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      gap: 1rem;
      z-index: 10;
    }

    /* Frame scrubber */
    #scrubber {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      cursor: pointer;
    }
    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4e8ce1;
      cursor: pointer;
    }
    #scrubber::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4e8ce1;
      border: none;
      cursor: pointer;
    }

    /* Auto-spin toggle */
    #spin-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 8px;
      padding: 0.45rem 0.9rem;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #spin-btn:hover { background: rgba(255,255,255,0.18); }
    #spin-btn.active {
      background: rgba(78,140,225,0.2);
      border-color: #4e8ce1;
      color: #4e8ce1;
    }

    /* Frame counter */
    .frame-counter { display: none; }

    @media (max-width: 480px) {
      .bottom-bar { padding: 0.5rem 1rem; }
    }

    /* ── HOTSPOT LAYER ── */
    #hotspot-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
    }
    .hotspot {
      position: absolute;
      pointer-events: all;
      cursor: pointer;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hotspot-pin svg {
      width: 32px;
      height: 42px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
      transition: transform 0.18s, filter 0.18s;
    }
    .hotspot:hover .hotspot-pin svg,
    .hotspot.selected .hotspot-pin svg {
      transform: scale(1.22) translateY(-3px);
      filter: drop-shadow(0 4px 12px rgba(255,215,0,0.85));
    }
    .hotspot-label {
      margin-top: 4px;
      background: rgba(13,27,42,0.82);
      color: #ffd700;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── INFO PANEL ── */
    #info-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(13, 27, 42, 0.96);
      border: 1px solid rgba(78, 140, 225, 0.45);
      border-radius: 14px;
      padding: 1.2rem 1.4rem 1rem;
      width: clamp(280px, 88vw, 560px);
      z-index: 25;
      display: none;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 36px rgba(0, 0, 0, 0.55);
      animation: panel-in 0.2s ease;
    }
    @keyframes panel-in {
      from { opacity: 0; transform: translate(-50%, -48%) scale(0.96); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    #info-panel.visible { display: block; }
    #info-panel-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 0.75rem;
      padding-bottom: 0.55rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-right: 1.4rem;
    }
    #info-panel-close {
      position: absolute;
      top: 0.65rem;
      right: 0.85rem;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.45);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }
    #info-panel-close:hover { color: #fff; }

    /* ── INFO PANEL — text rows ── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.42rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      gap: 1.2rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key {
      color: rgba(255,255,255,0.48);
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .info-val {
      color: #fff;
      font-size: 0.82rem;
      font-weight: 500;
      text-align: right;
    }
  </style>
</head>
<body>

  <!-- VIEWER -->
  <div id="spin-container">
    <img id="spin-img" src="" alt="Maison M2 360° view" draggable="false" />

    <!-- Hotspot markers -->
    <div id="hotspot-layer"></div>

    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="loading-title">Loading your Digital Home</div>
      <div id="load-bar-wrap"><div id="load-bar"></div></div>
      <div id="load-pct">0%</div>
      <div class="loading-sub">Preparing 360° experience…</div>
    </div>

    <!-- Drag hint -->
    <div id="hint-overlay">
      <div class="hint-pill">
        <span class="hint-icon">↔</span>
        Drag to rotate
      </div>
    </div>

    <!-- Info panel (shown on hotspot click) -->
    <div id="info-panel">
      <button id="info-panel-close" title="Close">✕</button>
      <div id="info-panel-title"></div>
      <div id="info-panel-body"></div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <input type="range" id="scrubber" min="0" value="0" />
    <button id="spin-btn">⟳ Auto</button>
    <span class="frame-counter" id="frame-counter">1 / 1</span>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // CONFIGURATION — edit these to match your setup
    // ─────────────────────────────────────────────
    const CONFIG = {
      // Base URL — update to your S3/CDN path once uploaded
      // For local testing: copy images into a '360' subfolder next to this HTML file
      baseUrl: 'https://apt-hsim-models.s3.eu-west-3.amazonaws.com/Maison/360/',

      // Total number of frames
      totalFrames: 209,

      // Filename pattern — {index} replaced with zero-padded frame number
      // Matches: 0001.png, 0002.png ... 0209.png
      filePattern: '{index}.png',

      // 4-digit zero-padding: 0001, 0002 ...
      padDigits: 4,

      // Pixels of horizontal drag needed to advance one frame
      dragSensitivity: 6,

      // Auto-spin speed in frames per second
      autoSpinFps: 20,

      // Number of frames to preload before showing the viewer
      preloadCount: 36,
    };
    // ─────────────────────────────────────────────

    // ─────────────────────────────────────────────
    // HOTSPOTS — pin markers with 2D plan images
    // x / y: position as % of container (0–100)
    // image: filename relative to this HTML file
    // caption: optional text under the image
    // ─────────────────────────────────────────────
    const HOTSPOTS = [
      {
        id: 'roof',
        label: 'Kitchen',
        x: 48, y: 53,
        anchorFrame: 0,
        alwaysVisible: true,
        properties: {
          'Surface Area':   '18 m²',
          'Ceiling Height': '2.70 m',
          'Floor Type':     'Ceramic Tiles',
          'Windows':        '2',
          'Orientation':    'South-East',
          'Fitted Kitchen': 'Yes',
        },
      },
      {
        id: 'upper-floor',
        label: 'Bedroom',
        x: 66, y: 63,
        anchorFrame: 0,
        properties: {
          'Surface Area':   '22 m²',
          'Ceiling Height': '2.60 m',
          'Floor Type':     'Hardwood Oak',
          'Windows':        '2',
          'Orientation':    'North-West',
          'Built-in Wardrobe': 'Yes',
        },
      },
      {
        id: 'ground-floor',
        label: 'Living Room',
        x: 34, y: 63,
        anchorFrame: 0,
        properties: {
          'Surface Area':   '38 m²',
          'Ceiling Height': '2.80 m',
          'Floor Type':     'Engineered Parquet',
          'Windows':        '3',
          'Orientation':    'South',
          'Terrace Access': 'Yes',
        },
      },
    ];
    // ─────────────────────────────────────────────

    let currentFrame = 0;
    let images = [];        // preloaded Image objects
    let loaded = 0;
    let isReady = false;
    let autoSpin = false;
    let spinInterval = null;

    // Drag state
    let isDragging = false;
    let dragStartX = 0;
    let dragAccum = 0;    // accumulated pixels since last frame step
    let didDrag   = false; // true if pointer moved enough to count as a drag

    const spinImg      = document.getElementById('spin-img');
    const loadOverlay  = document.getElementById('loading-overlay');
    const loadBar      = document.getElementById('load-bar');
    const loadPct      = document.getElementById('load-pct');
    const hintOverlay  = document.getElementById('hint-overlay');
    const scrubber     = document.getElementById('scrubber');
    const spinBtn      = document.getElementById('spin-btn');
    const frameCounter = document.getElementById('frame-counter');
    const container    = document.getElementById('spin-container');
    const infoPanel      = document.getElementById('info-panel');
    const infoPanelTitle = document.getElementById('info-panel-title');
    const infoPanelBody  = document.getElementById('info-panel-body');
    const infoPanelClose = document.getElementById('info-panel-close');

    // ── Helpers ──────────────────────────────────

    function frameSrc(index) {
      const padded = String(index + 1).padStart(CONFIG.padDigits, '0');
      return CONFIG.baseUrl + CONFIG.filePattern.replace('{index}', padded);
    }

    function showFrame(index) {
      currentFrame = ((index % CONFIG.totalFrames) + CONFIG.totalFrames) % CONFIG.totalFrames;
      if (images[currentFrame] && images[currentFrame].complete) {
        spinImg.src = images[currentFrame].src;
      }
      scrubber.value = currentFrame;
      frameCounter.textContent = `${currentFrame + 1} / ${CONFIG.totalFrames}`;
      if (isReady) updateHotspotPositions();
    }

    // ── Hotspot rotation tracking ─────────────────
    // Hotspots are only visible on frame 0 (the starting frame).
    function updateHotspotPositions() {
      const visible = currentFrame === 0;
      document.querySelectorAll('.hotspot').forEach(el => {
        const hs = HOTSPOTS.find(h => h.id === el.dataset.id);
        if (!hs) return;
        if (visible) {
          el.style.visibility = 'visible';
          el.style.opacity    = '1';
          el.style.left       = hs.x + '%';
          el.style.top        = hs.y + '%';
        } else {
          el.style.visibility = 'hidden';
          el.style.opacity    = '0';
        }
      });
    }

    function onFrameLoaded() {
      loaded++;
      const pct = Math.round((loaded / CONFIG.totalFrames) * 100);
      loadBar.style.width = pct + '%';
      loadPct.textContent = pct + '%';

      // Show viewer once preload count is ready
      if (!isReady && loaded >= CONFIG.preloadCount) {
        isReady = true;
        showFrame(0);
        loadOverlay.style.display = 'none';
        hintOverlay.classList.add('visible');
        setTimeout(() => hintOverlay.classList.remove('visible'), 3200);
      }
    }

    // ── Preload all frames ────────────────────────

    function preloadAll() {
      scrubber.max = CONFIG.totalFrames - 1;
      for (let i = 0; i < CONFIG.totalFrames; i++) {
        const img = new Image();
        img.onload = onFrameLoaded;
        img.onerror = onFrameLoaded;
        img.src = frameSrc(i);
        images[i] = img;
      }
    }

    // ── Auto-spin ────────────────────────────────

    function startSpin() {
      if (spinInterval) return;
      spinInterval = setInterval(() => {
        showFrame(currentFrame + 1);
      }, 1000 / CONFIG.autoSpinFps);
      autoSpin = true;
      spinBtn.classList.add('active');
      spinBtn.textContent = '⏸ Stop';
    }

    function stopSpin() {
      clearInterval(spinInterval);
      spinInterval = null;
      autoSpin = false;
      spinBtn.classList.remove('active');
      spinBtn.textContent = '⟳ Auto';
    }

    spinBtn.addEventListener('click', () => {
      autoSpin ? stopSpin() : startSpin();
    });

    // ── Drag — Mouse ─────────────────────────────

    container.addEventListener('pointerdown', (e) => {
      if (!isReady) return;
      isDragging = true;
      didDrag    = false;
      dragStartX = e.clientX;
      dragAccum = 0;
      stopSpin();
      container.classList.add('dragging');
      container.setPointerCapture(e.pointerId);
    });

    container.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      dragStartX = e.clientX;
      if (Math.abs(dx) > 2) didDrag = true;
      dragAccum += dx;

      const steps = Math.trunc(dragAccum / CONFIG.dragSensitivity);
      if (steps !== 0) {
        showFrame(currentFrame - steps);
        dragAccum -= steps * CONFIG.dragSensitivity;
      }
    });

    container.addEventListener('pointerup', () => {
      isDragging = false;
      container.classList.remove('dragging');
      setTimeout(() => { didDrag = false; }, 0);
    });

    container.addEventListener('pointercancel', () => {
      isDragging = false;
      container.classList.remove('dragging');
      setTimeout(() => { didDrag = false; }, 0);
    });

    // ── Scrubber ─────────────────────────────────

    scrubber.addEventListener('input', () => {
      stopSpin();
      showFrame(parseInt(scrubber.value));
    });

    // ── Keyboard ─────────────────────────────────

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft')  { stopSpin(); showFrame(currentFrame - 1); }
      if (e.key === 'ArrowRight') { stopSpin(); showFrame(currentFrame + 1); }
    });

    // ── Hotspots ─────────────────────────────────

    const PIN_SVG = `<svg viewBox="0 0 32 42" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 1C9.373 1 4 6.373 4 13c0 8.5 12 27 12 27S28 21.5 28 13c0-6.627-5.373-12-12-12z"
            fill="#ffd700" stroke="#b8960c" stroke-width="1.4"/>
      <circle cx="16" cy="13" r="5" fill="#0d1b2a"/>
    </svg>`;

    function showInfoPanel(hs) {
      infoPanelTitle.textContent = hs.label;
      infoPanelBody.innerHTML = Object.entries(hs.properties || {})
        .map(([k, v]) =>
          `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`)
        .join('');
      infoPanel.classList.remove('visible');
      void infoPanel.offsetWidth;
      infoPanel.classList.add('visible');
    }

    function createHotspots() {
      const layer = document.getElementById('hotspot-layer');
      HOTSPOTS.forEach(hs => {
        const el = document.createElement('div');
        el.className = 'hotspot';
        el.style.left = hs.x + '%';
        el.style.top  = hs.y + '%';
        el.dataset.id = hs.id;
        el.innerHTML  =
          `<div class="hotspot-pin">${PIN_SVG}</div>`
          + `<div class="hotspot-label">${hs.label}</div>`;

        el.addEventListener('pointerdown', e => e.stopPropagation());
        el.addEventListener('click', (e) => {
          if (didDrag) return;
          e.stopPropagation();
          document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('selected'));
          el.classList.add('selected');
          showInfoPanel(hs);
        });
        layer.appendChild(el);
      });
    }

    infoPanelClose.addEventListener('click', () => {
      infoPanel.classList.remove('visible');
      document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('selected'));
    });

    // Close panel when clicking the background (not after a drag)
    container.addEventListener('click', (e) => {
      if (didDrag) return;
      if (!e.target.closest('.hotspot') && !e.target.closest('#info-panel')) {
        infoPanel.classList.remove('visible');
        document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('selected'));
      }
    });

    // ── Start ────────────────────────────────────

    createHotspots();
    preloadAll();
  </script>
</body>
</html>
