<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Maison M2 — 360° View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── VIEWER ── */
    #spin-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #spin-container.dragging { cursor: grabbing; }

    #spin-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      will-change: contents;
      filter: brightness(1.25);
    }

    /* ── FLOOR SELECTOR ── */
    #floor-selector {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.3rem;
      z-index: 30;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 50px;
      padding: 0.3rem 0.4rem;
      /* mobile: don't let it overflow the screen */
      max-width: calc(100vw - 2rem);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #floor-selector::-webkit-scrollbar { display: none; }
    .floor-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      border-radius: 50px;
      padding: 0.5rem 1rem;
      min-height: 44px;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
      font-family: inherit;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
    }
    .floor-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .floor-btn.active {
      background: #4e8ce1;
      color: #fff;
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      gap: 1rem;
      z-index: 10;
    }

    /* Auto-spin toggle */
    #spin-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 8px;
      padding: 0.6rem 1.4rem;
      min-height: 44px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #spin-btn:hover { background: rgba(255,255,255,0.18); }
    #spin-btn.active {
      background: rgba(78,140,225,0.2);
      border-color: #4e8ce1;
      color: #4e8ce1;
    }

    /* Frame counter */
    .frame-counter { display: none; }

    @media (max-width: 480px) {
      #floor-selector { top: 0.6rem; }
      #spin-btn { font-size: 0.8rem; padding: 0.55rem 1.1rem; }
    }

  </style>
</head>
<body>

  <!-- VIEWER -->
  <div id="spin-container">
    <img id="spin-img" src="" alt="Maison M2 360° view" draggable="false" />

    <!-- Floor selector -->
    <div id="floor-selector">
      <button class="floor-btn active" data-floor="0">Aerial</button>
      <button class="floor-btn" data-floor="1">Floor 1</button>
      <button class="floor-btn" data-floor="2">Floor 2</button>
      <button class="floor-btn" data-floor="3">Floor 3</button>
      <button class="floor-btn" data-floor="4">Floor 4</button>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button id="spin-btn">⟳ Auto</button>
    <span class="frame-counter" id="frame-counter">1 / 1</span>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // FLOORS — add/edit entries to match your S3 paths
    // ─────────────────────────────────────────────
    const FLOORS = [
      { label: 'Aerial',  baseUrl: 'https://apt-hsim-models.s3.eu-west-3.amazonaws.com/ParcDeLac/Aerial/', totalFrames: 60 },
      { label: 'Floor 1', baseUrl: 'https://apt-hsim-models.s3.eu-west-3.amazonaws.com/ParcDeLac/G1/',     totalFrames: 60 },
      { label: 'Floor 2', baseUrl: 'https://apt-hsim-models.s3.eu-west-3.amazonaws.com/ParcDeLac/G2/',     totalFrames: 60 },
      { label: 'Floor 3', baseUrl: 'https://apt-hsim-models.s3.eu-west-3.amazonaws.com/ParcDeLac/G3/',     totalFrames: 60 },
      { label: 'Floor 4', baseUrl: 'https://apt-hsim-models.s3.eu-west-3.amazonaws.com/ParcDeLac/G4/',     totalFrames: 60 },
    ];

    // ─────────────────────────────────────────────
    // SHARED CONFIG
    // ─────────────────────────────────────────────
    const CONFIG = {
      // Filename pattern — {index} replaced with zero-padded frame number
      filePattern: '{index}.png',

      // 4-digit zero-padding: 0001, 0002 ...
      padDigits: 4,

      // Pixels of horizontal drag needed to advance one frame
      dragSensitivity: 6,

      // Auto-spin: full rotation duration in milliseconds (higher = slower)
      spinDuration: 18000,

      // Number of frames to preload before showing the viewer
      preloadCount: 36,
    };
    // ─────────────────────────────────────────────

    let currentFloor  = 0;
    let loadGeneration = 0;
    let currentFrame  = 0;
    let images        = [];
    let loaded        = 0;
    let isReady       = false;
    let autoSpin      = false;
    let spinRafId     = null;
    let spinLastTime  = null;
    let spinProgress  = 0;   // fractional frame accumulator

    // Drag state
    let isDragging = false;
    let dragStartX = 0;
    let dragAccum  = 0;
    let didDrag    = false;

    const spinImg      = document.getElementById('spin-img');
    const spinBtn      = document.getElementById('spin-btn');
    const frameCounter = document.getElementById('frame-counter');
    const container    = document.getElementById('spin-container');
    const floorBtns    = document.querySelectorAll('.floor-btn');

    // ── Helpers ──────────────────────────────────

    function frameSrc(index, floor) {
      const padded = String(index + 1).padStart(CONFIG.padDigits, '0');
      return floor.baseUrl + CONFIG.filePattern.replace('{index}', padded);
    }

    function showFrame(index) {
      const total = FLOORS[currentFloor].totalFrames;
      currentFrame = ((index % total) + total) % total;
      if (images[currentFrame] && images[currentFrame].complete) {
        spinImg.src = images[currentFrame].src;
      }
      frameCounter.textContent = `${currentFrame + 1} / ${total}`;
    }

    function onFrameLoaded(gen) {
      if (gen !== loadGeneration) return; // stale callback from previous floor
      loaded++;

      if (!isReady && loaded >= CONFIG.preloadCount) {
        isReady = true;
        showFrame(0);
      }
    }

    // ── Preload frames for current floor ─────────

    function preloadAll() {
      const floor = FLOORS[currentFloor];
      const total = floor.totalFrames;
      const gen   = loadGeneration;
      for (let i = 0; i < total; i++) {
        const img = new Image();
        img.onload  = () => onFrameLoaded(gen);
        img.onerror = () => onFrameLoaded(gen);
        img.src = frameSrc(i, floor);
        images[i] = img;
      }
    }

    // ── Floor switching ───────────────────────────

    function switchFloor(floorIndex) {
      if (floorIndex === currentFloor && isReady) return;
      currentFloor = floorIndex;

      // Update button states
      floorBtns.forEach((btn, i) => btn.classList.toggle('active', i === floorIndex));

      // Reset viewer
      stopSpin();
      isReady       = false;
      loaded        = 0;
      images        = [];
      currentFrame  = 0;
      loadGeneration++;

      preloadAll();
    }

    floorBtns.forEach((btn) => {
      btn.addEventListener('click', () => switchFloor(parseInt(btn.dataset.floor)));
    });

    // ── Auto-spin ────────────────────────────────

    function spinStep(timestamp) {
      if (!autoSpin) return;
      if (spinLastTime === null) spinLastTime = timestamp;
      const delta = timestamp - spinLastTime;
      spinLastTime = timestamp;

      const total = FLOORS[currentFloor].totalFrames;
      spinProgress += (delta / CONFIG.spinDuration) * total;
      if (spinProgress >= 1) {
        const steps = Math.floor(spinProgress);
        spinProgress -= steps;
        showFrame(currentFrame + steps);
      }
      spinRafId = requestAnimationFrame(spinStep);
    }

    function startSpin() {
      if (autoSpin) return;
      autoSpin = true;
      spinLastTime = null;
      spinProgress = 0;
      spinRafId = requestAnimationFrame(spinStep);
      spinBtn.classList.add('active');
      spinBtn.textContent = '⏸ Stop';
    }

    function stopSpin() {
      if (spinRafId) { cancelAnimationFrame(spinRafId); spinRafId = null; }
      spinLastTime = null;
      autoSpin = false;
      spinBtn.classList.remove('active');
      spinBtn.textContent = '⟳ Auto';
    }

    spinBtn.addEventListener('click', () => {
      autoSpin ? stopSpin() : startSpin();
    });

    // ── Drag — Mouse ─────────────────────────────

    container.addEventListener('pointerdown', (e) => {
      if (!isReady) return;
      if (e.target.closest('#floor-selector')) return;
      isDragging = true;
      didDrag    = false;
      dragStartX = e.clientX;
      dragAccum = 0;
      stopSpin();
      container.classList.add('dragging');
      container.setPointerCapture(e.pointerId);
    });

    container.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      dragStartX = e.clientX;
      if (Math.abs(dx) > 2) didDrag = true;
      dragAccum += dx;

      const steps = Math.trunc(dragAccum / CONFIG.dragSensitivity);
      if (steps !== 0) {
        showFrame(currentFrame - steps);
        dragAccum -= steps * CONFIG.dragSensitivity;
      }
    });

    container.addEventListener('pointerup', () => {
      isDragging = false;
      container.classList.remove('dragging');
      setTimeout(() => { didDrag = false; }, 0);
    });

    container.addEventListener('pointercancel', () => {
      isDragging = false;
      container.classList.remove('dragging');
      setTimeout(() => { didDrag = false; }, 0);
    });

    // ── Keyboard ─────────────────────────────────

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft')  { stopSpin(); showFrame(currentFrame - 1); }
      if (e.key === 'ArrowRight') { stopSpin(); showFrame(currentFrame + 1); }
    });

    // ── Start ────────────────────────────────────

    preloadAll();
  </script>
</body>
</html>
